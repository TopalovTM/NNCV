experiment_name: peak-deeplabv3plus-r101-tuned

data:
  root_dir: ../data/cityscapes
  num_classes: 19
  image_size: [512, 1024]
  num_workers: 8

model:
  name: deeplabv3plus
  encoder_name: resnet101
  encoder_weights: imagenet
  in_channels: 3
  classes: 19

train:
  seed: 42
  batch_size: 4
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  amp: true
  label_smoothing: 0.05
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 3
  early_stopping_patience: 6

logging:
  use_wandb: true
  project: 5lsm0-cityscapes-segmentation
  log_images: true
